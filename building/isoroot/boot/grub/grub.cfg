# isoroot/boot/grub/grub.cfg

set timeout=0
set default=0
insmod all_video
insmod gfxterm
insmod png
terminal_output gfxterm
background_image /boot/grub/romanesku.png

set menu_color_normal=green/red
set menu_color_highlight=yellow/blue

menuentry "ball linux live iso" {
    linux  /boot/vmlinuz  root=/dev/ram0 console=tty0 console=ttyS0 rw quiet
    initrd /boot/initrd.img
}